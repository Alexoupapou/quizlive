<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FBI — Test de Positionnement</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');
:root{
  --navy:#0A0E1A; --navy2:#0D1220; --gold:#C8A951; --gold2:#E8C96A;
  --red:#CC2222;  --green:#22963F; --text:#E8EDF5; --muted:#8892A4;
  --border:rgba(200,169,81,0.25); --mono:'Share Tech Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--navy);color:var(--text);font-family:'Oswald',sans-serif;height:100%;overflow:hidden;touch-action:manipulation;}
.panel{display:none;height:100vh;flex-direction:column;overflow:hidden;}
.panel.active{display:flex;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:linear-gradient(135deg,#0D1220,#111827);border-bottom:2px solid var(--gold);flex-shrink:0;}
.hdr-left{display:flex;align-items:center;gap:12px;}
.hdr img{width:38px;height:38px;}
.hdr-title{font-size:.75rem;color:var(--gold);letter-spacing:3px;}
.hdr-sub{font-size:.55rem;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.hdr-right{display:flex;align-items:center;gap:20px;font-family:var(--mono);}
#pres-q-counter{font-size:.8rem;color:var(--muted);}
#pres-room-pin{font-size:1.2rem;color:var(--gold);letter-spacing:8px;}
.timerbar{height:5px;background:rgba(255,255,255,.05);flex-shrink:0;}
#pres-timer-bar{height:100%;width:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .5s linear;}
#pres-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 40px;gap:22px;overflow:hidden;}
.lobby{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;width:100%;}
.lobby-top{display:flex;gap:48px;align-items:center;justify-content:center;flex-wrap:wrap;}
.lobby-qr-block{display:flex;flex-direction:column;align-items:center;gap:10px;}
#lobby-qr{padding:20px;background:#ffffff;border-radius:10px;box-shadow:0 0 0 6px #ffffff;}
.lobby-pin-block{display:flex;flex-direction:column;align-items:flex-start;gap:6px;}
.lobby-label{font-size:.6rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
#lobby-pin{font-family:var(--mono);font-size:3.5rem;color:var(--gold);letter-spacing:14px;}
#lobby-url{font-size:.7rem;color:var(--muted);margin-top:4px;}
.lobby-title{font-size:1.8rem;color:var(--gold);letter-spacing:6px;}
.player-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:700px;}
.chip{background:var(--navy2);border:1px solid var(--border);border-radius:20px;padding:5px 16px;font-size:.85rem;animation:chipin .3s ease-out;}
@keyframes chipin{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.space-hint{font-size:.7rem;color:var(--muted);letter-spacing:3px;margin-top:4px;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.3;}50%{opacity:.9;}}
.bottom-hint{position:fixed;bottom:14px;right:20px;font-family:var(--mono);font-size:.65rem;color:var(--muted);letter-spacing:2px;opacity:.5;}
#pres-countdown{font-family:var(--mono);font-size:7rem;color:var(--gold);animation:cpulse 1s ease-in-out infinite;}
@keyframes cpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
#pres-question{font-size:clamp(1.2rem,3vw,2rem);color:var(--text);text-align:center;line-height:1.5;max-width:900px;}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:820px;}
.ans-card{background:var(--navy2);border:2px solid var(--border);border-radius:10px;padding:18px 22px;font-size:clamp(.9rem,2vw,1.1rem);display:flex;align-items:center;gap:12px;transition:all .4s;}
.ans-card .ltr{font-family:var(--mono);color:var(--gold);font-size:1.2em;font-weight:700;min-width:24px;}
.ans-card.correct{border-color:var(--green);background:rgba(34,150,63,.18);}
.ans-card.wrong{border-color:rgba(204,34,34,.4);opacity:.45;}
.slider-reveal{font-family:var(--mono);font-size:3rem;color:var(--gold);text-align:center;}
#wc-wrap{width:min(720px,90vw);height:min(380px,55vh);background:var(--navy2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.lb-wrap{width:100%;max-width:660px;}
.lb-title{font-size:1.1rem;color:var(--gold);letter-spacing:4px;text-align:center;margin-bottom:14px;}
.lb-row{display:flex;align-items:center;gap:14px;padding:11px 20px;margin-bottom:8px;background:var(--navy2);border:1px solid var(--border);border-radius:8px;}
.lb-row.gold{border-color:var(--gold);background:rgba(200,169,81,.1);}
.lb-rank{font-family:var(--mono);color:var(--gold);width:28px;font-size:1.1em;}
.lb-name{flex:1;font-size:1rem;}
.lb-score{font-family:var(--mono);color:var(--gold2);font-size:.95rem;}
.lb-streak{font-size:.9rem;min-width:36px;text-align:right;}
.end-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center;}
#admin-login{display:none;height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px;}
#admin-login.active{display:flex;}
#admin-login img{width:70px;height:70px;}
#admin-login h1{font-size:1rem;color:var(--gold);letter-spacing:4px;}
#apin-input{background:var(--navy2);border:2px solid var(--border);border-radius:8px;padding:16px 24px;font-family:var(--mono);font-size:1.8rem;color:var(--gold);text-align:center;letter-spacing:10px;outline:none;width:220px;}
#apin-input:focus{border-color:var(--gold);}
#apin-btn{padding:14px 36px;font-family:'Oswald';font-size:1rem;letter-spacing:3px;background:var(--gold);color:#000;border:none;border-radius:6px;cursor:pointer;}
#apin-err{color:var(--red);font-size:.85rem;min-height:20px;}
#player-panel{display:none;height:100vh;flex-direction:column;overflow:hidden;}
#player-panel.active{display:flex;}
.phdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(135deg,#0D1220,#111827);border-bottom:2px solid var(--gold);flex-shrink:0;}
.phdr-left{display:flex;align-items:center;gap:8px;}
.phdr img{width:28px;height:28px;}
.pt{font-size:.75rem;color:var(--gold);letter-spacing:2px;}
.pn{font-size:.65rem;color:var(--muted);margin-top:1px;}
#streak-disp{display:flex;align-items:center;gap:4px;background:rgba(200,169,81,.08);border:1px solid rgba(200,169,81,.2);border-radius:20px;padding:4px 10px;transition:all .3s;}
#streak-disp.on{background:rgba(200,169,81,.2);border-color:var(--gold);}
#streak-fire{font-size:1.2rem;transition:all .3s;}
#streak-disp.s3 #streak-fire{font-size:1.5rem;animation:fw .5s ease-in-out infinite;}
@keyframes fw{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}
#streak-disp.sgold{animation:gp .8s ease-in-out;}
@keyframes gp{0%{transform:scale(1);}30%{transform:scale(1.25);box-shadow:0 0 20px var(--gold);}100%{transform:scale(1);}}
.pscore{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--navy2);border-bottom:1px solid var(--border);flex-shrink:0;font-family:var(--mono);font-size:.75rem;color:var(--muted);}
#p-score-val{color:var(--gold2);font-size:.95rem;}
#player-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 10px;gap:12px;overflow:hidden;}
.wait{display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;}
.wdot{width:50px;height:50px;border-radius:50%;background:var(--gold);opacity:.3;animation:pdot 1.5s ease-in-out infinite;}
@keyframes pdot{0%,100%{transform:scale(1);opacity:.3;}50%{transform:scale(1.2);opacity:.6;}}
.wait h2{font-size:1.1rem;color:var(--gold);letter-spacing:2px;}
.wait p{font-size:.8rem;color:var(--muted);}
#p-q-text{font-size:clamp(.95rem,4vw,1.2rem);color:var(--text);text-align:center;line-height:1.5;max-width:340px;}
#p-answers{width:100%;max-width:380px;display:flex;flex-direction:column;gap:10px;}
#p-answers.g2{display:grid;grid-template-columns:1fr 1fr;}
.pabtn{background:var(--navy2);border:2px solid var(--border);border-radius:10px;padding:16px 14px;font-family:'Oswald';font-size:1rem;letter-spacing:1px;color:var(--text);cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:all .15s;min-height:56px;-webkit-user-select:none;user-select:none;}
.pabtn .bl{font-family:var(--mono);color:var(--gold);font-size:1.1em;min-width:22px;}
.pabtn:active{transform:scale(.96);}
.pabtn.dis{pointer-events:none;opacity:.5;}
.pabtn.rc{border-color:var(--green)!important;background:rgba(34,150,63,.25)!important;animation:rcv .5s ease-out;}
.pabtn.rw{border-color:var(--red)!important;background:rgba(204,34,34,.2)!important;animation:rwv .5s ease-out;}
@keyframes rcv{0%{transform:scale(1);}40%{transform:scale(1.05);}100%{transform:scale(1);}}
@keyframes rwv{0%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-4px);}100%{transform:translateX(0);}}
#p-feedback{position:fixed;top:0;left:0;right:0;bottom:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:rgba(10,14,26,.85);z-index:100;pointer-events:none;}
#p-feedback.show{display:flex;animation:fbin .3s ease-out;}
@keyframes fbin{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}
#fb-emoji{font-size:4rem;}
#fb-text{font-size:1.3rem;color:var(--text);letter-spacing:2px;}
#fb-pts{font-family:var(--mono);font-size:1.8rem;color:var(--gold);}
#sl-container{width:100%;max-width:360px;}
#sl-val{font-family:var(--mono);font-size:2.5rem;color:var(--gold);text-align:center;margin-bottom:12px;}
input[type=range]{-webkit-appearance:none;width:100%;height:8px;background:var(--navy2);border-radius:4px;border:1px solid var(--border);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--gold2);}
.sl-bounds{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.7rem;color:var(--muted);margin-top:4px;}
.sl-submit{margin-top:14px;width:100%;padding:16px;font-size:1rem;font-family:'Oswald';letter-spacing:2px;background:var(--gold);color:#000;border:none;border-radius:8px;cursor:pointer;}
.txt-wrap{width:100%;max-width:360px;}
.txt-input{width:100%;background:var(--navy2);border:2px solid var(--border);border-radius:8px;padding:14px 16px;font-family:var(--mono);font-size:1.1rem;color:var(--text);outline:none;text-align:center;}
.txt-input:focus{border-color:var(--gold);}
.txt-submit{margin-top:10px;width:100%;padding:16px;font-size:1rem;font-family:'Oswald';letter-spacing:2px;background:var(--gold);color:#000;border:none;border-radius:8px;cursor:pointer;}
#login-panel{display:none;height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:28px;}
#login-panel.active{display:flex;}
#login-panel img{width:70px;height:70px;}
#login-panel h1{font-size:.95rem;color:var(--gold);letter-spacing:3px;text-align:center;}
.l-input{width:100%;max-width:320px;background:var(--navy2);border:2px solid var(--border);border-radius:8px;padding:16px;font-family:var(--mono);font-size:1.1rem;color:var(--text);outline:none;text-align:center;letter-spacing:3px;}
.l-input:focus{border-color:var(--gold);}
#l-name{letter-spacing:1px;font-size:1rem;}
.l-btn{width:100%;max-width:320px;padding:16px;font-family:'Oswald';font-size:1rem;letter-spacing:3px;background:var(--gold);color:#000;border:none;border-radius:8px;cursor:pointer;}
#l-err{color:var(--red);font-size:.85rem;min-height:20px;text-align:center;}
</style>
</head>

  }catch(e){return null;}
}

var actx=null;
function getActx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function tone(f,dur,type,v){
  type=type||"sine";v=v||0.3;
  try{
    var ctx=getActx(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.value=f;
    g.gain.setValueAtTime(v,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function sndOk(){tone(523,.12,"sine",.25);setTimeout(function(){tone(659,.18,"sine",.25);},100);setTimeout(function(){tone(784,.25,"sine",.3);},200);}

async function startPresenter(){
  var pin=Math.floor(100000+Math.random()*900000);
  await fbSet("game",{
    status:"lobby",currentQuestion:-1,pin:pin,quizName:QUIZ_NAME,
    questions:QUESTIONS,questionStartTime:0,countdownEnd:0,answerStats:[0,0,0,0]
  });
  await fbSet("players",null);
  show("pres-panel");
  $("pres-room-pin").textContent=pin;
  renderLobby(pin,{});
  presPollingIv=setInterval(pollPres,1200);
  document.addEventListener("keydown",onSpace);
  document.addEventListener("touchend",onTap);
}

async function pollPres(){
  var game=await fbGet("game");
  var players=await fbGet("players");
  if(!game)return;
  var pl=players||{};
  var status=game.status;
  var prevStatus=presState?presState.status:null;
  var prevQ=presState?presState.currentQuestion:-99;
  presState=game;

  if(status==="lobby"){renderLobby(game.pin,pl);return;}

  if(status!==prevStatus||game.currentQuestion!==prevQ){
    renderPres(game,pl);
  } else if(status==="question"){
    updateTimerBar(game);
    var q=QUESTIONS[game.currentQuestion];
    if(q&&q.type==="wordcloud"&&!wcFrozen)updateWCLive(pl,game.currentQuestion);
    if(game.currentQuestion>=0&&game.questionStartTime){
      var playerList=Object.values(pl);
      var elapsed=(Date.now()-game.questionStartTime)/1000;
      var timerExpired=q&&elapsed>=(q.timeLimit+1);
      var allAnswered=playerList.length>0&&playerList.every(function(p){return(p.answeredCount||0)>game.currentQuestion;});
      if((allAnswered||timerExpired)&&!autoRevealPending){
        autoRevealPending=true;
        var delay=allAnswered?1200:0;
        setTimeout(async function(){
          var g=await fbGet("game");
          if(g&&g.status==="question"&&g.currentQuestion===game.currentQuestion){
            await fbPatch("game",{status:"answer_reveal"});
          }
          autoRevealPending=false;
        },delay);
      }
    }
  } else if(status==="leaderboard"||status==="answer_reveal"){
    renderPres(game,pl);
  }
}

function renderPres(game,players){
  if(presTimerIv){clearInterval(presTimerIv);presTimerIv=null;}
  var stage=$("pres-stage");
  spaceReady=false;
  autoRevealPending=false;
  $("bottom-hint").textContent="";

  // COUNTDOWN
  if(game.status==="countdown"){
    var q=QUESTIONS[game.currentQuestion];
    $("pres-q-counter").textContent="Q"+(game.currentQuestion+1)+"/"+QUESTIONS.length;
    stage.innerHTML=
      "<div style=\"font-family:var(--mono);font-size:7rem;color:var(--gold);animation:cpulse 1s ease-in-out infinite;\" id=\"pres-cd\"></div>"+
      "<div style=\"font-size:.85rem;color:var(--muted);letter-spacing:3px;\">"+(q?q.question.substring(0,60)+"...":"")+"</div>";
    var cdIv=setInterval(function(){
      var r=Math.max(0,Math.ceil((game.countdownEnd-Date.now())/1000));
      var el=$("pres-cd");if(el)el.textContent=r;
      if(r<=0)clearInterval(cdIv);
    },150);
    return;
  }

  // QUESTION
  if(game.status==="question"&&game.currentQuestion>=0){
    var q=QUESTIONS[game.currentQuestion];
    $("pres-q-counter").textContent="Q"+(game.currentQuestion+1)+"/"+QUESTIONS.length;
    var inner="";
    if(q.type==="mcq"){
      var cards=q.answers.map(function(a,i){
        return "<div class=\"ans-card\"><span class=\"ltr\">"+"ABCD"[i]+"</span>"+a+"</div>";
      }).join("");
      inner="<div id=\"pres-question\">"+q.question+"</div><div class=\"ans-grid\">"+cards+"</div>";
    } else if(q.type==="tf"){
      inner="<div id=\"pres-question\">"+q.question+"</div>"+
        "<div class=\"ans-grid\" style=\"max-width:460px;\">"+
        "<div class=\"ans-card\"><span class=\"ltr\">&#10003;</span>VRAI</div>"+
        "<div class=\"ans-card\"><span class=\"ltr\">&#10007;</span>FAUX</div></div>";
    } else if(q.type==="slider"){
      inner="<div id=\"pres-question\">"+q.question+"</div>"+
        "<div style=\"font-family:var(--mono);font-size:1rem;color:var(--muted);\">"+q.min+" &#8212; "+q.max+"</div>";
    } else if(q.type==="wordcloud"){
      wcWords={};wcOrder=[];wcFrozen=false;
      inner="<div id=\"pres-question\">"+q.question+"</div>"+
        "<div id=\"wc-wrap\"><canvas id=\"pres-wc\" width=\"720\" height=\"380\"></canvas></div>";
    }
    stage.innerHTML=inner;
    updateTimerBar(game);
    var elapsed=(Date.now()-game.questionStartTime)/1000;
    var remaining=Math.max(0,q.timeLimit-elapsed);
    setTimeout(async function(){
      var g=await fbGet("game");
      if(g&&g.status==="question"&&g.currentQuestion===game.currentQuestion){
        await fbPatch("game",{status:"answer_reveal"});
      }
    },remaining*1000+800);
    return;
  }

  // ANSWER REVEAL
  if(game.status==="answer_reveal"&&game.currentQuestion>=0){
    var q=QUESTIONS[game.currentQuestion];
    wcFrozen=true;
    $("pres-timer-bar").style.width="0%";
    if(q.type==="mcq"){
      var cards=q.answers.map(function(a,i){
        var cls=i===q.correct?"correct":"wrong";
        return "<div class=\"ans-card "+cls+"\"><span class=\"ltr\">"+"ABCD"[i]+"</span>"+a+"</div>";
      }).join("");
      stage.innerHTML="<div id=\"pres-question\" style=\"margin-bottom:4px;\">"+q.question+"</div><div class=\"ans-grid\">"+cards+"</div>";
    } else if(q.type==="tf"){
      var vcls=q.correct===true?"correct":"wrong";
      var fcls=q.correct===false?"correct":"wrong";
      stage.innerHTML="<div id=\"pres-question\">"+q.question+"</div>"+
        "<div class=\"ans-grid\" style=\"max-width:460px;\">"+
        "<div class=\"ans-card "+vcls+"\"><span class=\"ltr\">&#10003;</span>VRAI</div>"+
        "<div class=\"ans-card "+fcls+"\"><span class=\"ltr\">&#10007;</span>FAUX</div></div>";
    } else if(q.type==="slider"){
      stage.innerHTML="<div id=\"pres-question\">"+q.question+"</div>"+
        "<div class=\"slider-reveal\">"+q.answer+"</div>";
    } else if(q.type==="wordcloud"){
      if(!$("wc-wrap")){
        stage.innerHTML="<div id=\"pres-question\">"+q.question+"</div>"+
          "<div id=\"wc-wrap\"><canvas id=\"pres-wc\" width=\"720\" height=\"380\"></canvas></div>";
      }
    } else {
      stage.innerHTML="<div id=\"pres-question\">"+q.question+"</div>"+
        "<div class=\"slider-reveal\">"+(q.answer||"")+"</div>";
    }
    setTimeout(async function(){
      var g=await fbGet("game");
      if(g&&g.status==="answer_reveal"&&g.currentQuestion===game.currentQuestion){
        await fbPatch("game",{status:"leaderboard"});
      }
    },4000);
    return;
  }

  // LEADERBOARD
  if(game.status==="leaderboard"){
    var list=Object.values(players).sort(function(a,b){return(b.score||0)-(a.score||0);}).slice(0,3);
    var isLast=game.currentQuestion>=QUESTIONS.length-1;
    var medals=["&#127945;","&#127946;","&#127947;"];
    var rows=list.map(function(p,i){
      var streak=(p.streak||0)>=2?"&#x1F525;"+(p.streak):"";
      return "<div class=\"lb-row "+(i===0?"gold":"")+"\">"+
        "<span class=\"lb-rank\">"+(medals[i]||"#"+(i+1))+"</span>"+
        "<span class=\"lb-name\">"+(p.name||"?")+"</span>"+
        "<span class=\"lb-score\">"+(p.score||0)+" pts</span>"+
        "<span class=\"lb-streak\">"+streak+"</span></div>";
    }).join("");
    stage.innerHTML="<div class=\"lb-wrap\"><div class=\"lb-title\">&#127942; CLASSEMENT</div>"+rows+"</div>";
    $("bottom-hint").textContent=isLast?"":"ESPACE - QUESTION SUIVANTE";
    spaceReady=!isLast;
    if(isLast){setTimeout(function(){fbPatch("game",{status:"end"});},3000);}
    return;
  }

  // END - PODIUM
  if(game.status==="end"){
    var list=Object.values(players).sort(function(a,b){return(b.score||0)-(a.score||0);}).slice(0,3);
    var order=[1,0,2];
    var heights=["160px","200px","130px"];
    var medals=["&#127945;","&#127946;","&#127947;"];
    var blocks=order.map(function(i){
      var p=list[i];if(!p)return"";
      var isFirst=(i===0);
      return "<div style=\"display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;\">"+
        "<div style=\"font-size:"+(isFirst?"1.3rem":"1rem")+";color:var(--gold);font-weight:700;\">"+(p.name||"?")+"</div>"+
        "<div style=\"font-family:var(--mono);font-size:"+(isFirst?"1.1rem":".85rem")+";color:var(--gold2);\">"+(p.score||0)+" pts</div>"+
        "<div style=\"background:"+(isFirst?"rgba(200,169,81,.2)":"rgba(200,169,81,.08)")+";border:2px solid "+(isFirst?"var(--gold)":"var(--border)")+";border-radius:8px 8px 0 0;width:100%;height:"+heights[i]+";display:flex;align-items:flex-start;justify-content:center;padding-top:12px;font-size:"+(isFirst?"3rem":"2.2rem")+";\">"+medals[i]+"</div>"+
      "</div>";
    }).join("");
    stage.innerHTML=
      "<div class=\"end-wrap\">"+
        "<div style=\"font-size:1.4rem;color:var(--gold);letter-spacing:6px;margin-bottom:8px;\">FIN DE MISSION</div>"+
        "<div style=\"display:flex;align-items:flex-end;justify-content:center;gap:16px;width:100%;max-width:700px;\">"+blocks+"</div>"+
        "<div style=\"font-size:.65rem;color:var(--muted);letter-spacing:3px;margin-top:12px;\">FEDERAL BUREAU OF INVESTIGATION &#183; CERTIFICATION COMPL&#200;TE</div>"+
      "</div>";
    $("pres-timer-bar").style.width="0%";
    spaceReady=false;
    return;
  }
}

function updateTimerBar(game){
  if(presTimerIv)clearInterval(presTimerIv);
  var q=QUESTIONS[game.currentQuestion];
  if(!q||!game.questionStartTime)return;
  presTimerIv=setInterval(function(){
    var elapsed=(Date.now()-game.questionStartTime)/1000;
    var rem=Math.max(0,q.timeLimit-elapsed);
    $("pres-timer-bar").style.width=(rem/q.timeLimit*100)+"%";
    if(rem<=0)clearInterval(presTimerIv);
  },300);
}

function onSpace(e){if(e.code==="Space"&&spaceReady){e.preventDefault();advanceQuestion();}}
var lastTap=0;
function onTap(e){
  if(!spaceReady)return;
  var now=Date.now();if(now-lastTap<400)return;lastTap=now;
  if(e.target.tagName==="INPUT"||e.target.tagName==="BUTTON")return;
  advanceQuestion();
}

async function advanceQuestion(){
  if(!spaceReady)return;
  spaceReady=false;
  var game=await fbGet("game");
  if(!game)return;
  if(game.status==="lobby"){
    await fbPatch("game",{status:"countdown",currentQuestion:0,countdownEnd:Date.now()+3000,questionStartTime:0,answerStats:[0,0,0,0]});
    setTimeout(async function(){
      var g=await fbGet("game");
      if(g&&g.status==="countdown")
        await fbPatch("game",{status:"question",questionStartTime:Date.now()});
    },3000);
    return;
  }
  if(game.status==="leaderboard"){
    var nextQ=(game.currentQuestion||0)+1;
    if(nextQ>=QUESTIONS.length){await fbPatch("game",{status:"end"});return;}
    await fbPatch("game",{status:"countdown",currentQuestion:nextQ,countdownEnd:Date.now()+3000,questionStartTime:0,answerStats:[0,0,0,0]});
    setTimeout(async function(){
      var g=await fbGet("game");
      if(g&&g.status==="countdown")
        await fbPatch("game",{status:"question",questionStartTime:Date.now()});
    },3000);
  }
}

// ================================================================
// WORDCLOUD
// ================================================================
function updateWCLive(players,qIdx){
  if(wcFrozen)return;
  var prev=wcOrder.length;
  Object.values(players).forEach(function(p){
    if(p.lastAnswer&&p.lastAnswer.question===qIdx&&p.lastAnswer.value){
      var w=p.lastAnswer.value.toLowerCase().trim();
      if(w&&wcOrder.indexOf(w)===-1)wcOrder.push(w);
    }
  });
  if(wcOrder.length===prev)return;
  var canvas=$("pres-wc");
  if(!canvas)return;
  var n=wcOrder.length;
  var cols=["#C8A951","#E8C96A","#E8EDF5","#8892A4"];
  var list=wcOrder.map(function(w,i){
    return [w,Math.round(80-((80-20)*(i/Math.max(n-1,1))))];
  });
  try{
    WordCloud(canvas,{
      list:list,backgroundColor:"#0D1220",
      color:function(word){return cols[wcOrder.indexOf(word)%cols.length];},
      fontFamily:"Oswald",rotateRatio:0,gridSize:10,minSize:14,
      drawOutOfBound:false,shrinkToFit:true
    });
  }catch(e){}
}

var pid=null,pname="",pscore=0,pstreak=0,pAnswered=-1;
var pPollIv=null,pTimerIv=null,pGame=null,sliderTouched=false;

async function playerLogin(){
  var pinV=$("l-pin").value.trim();
  var nameV=$("l-name").value.trim();
  if(!pinV||pinV.length<6){$("l-err").textContent="PIN requis (6 chiffres)";return;}
  if(!nameV){$("l-err").textContent="Nom d'agent requis";return;}
  var game=await fbGet("game");
  if(!game){$("l-err").textContent="Connexion impossible";return;}
  if(String(game.pin)!==String(pinV)){$("l-err").textContent="PIN INCORRECT";return;}
  if(["lobby","countdown","question"].indexOf(game.status)===-1){$("l-err").textContent="Quiz non disponible";return;}
  var existing=await fbGet("players");
  var id=null;
  if(existing){
    var found=Object.entries(existing).find(function(e){
      return e[1].name&&e[1].name.toLowerCase()===nameV.toLowerCase();
    });
    if(found)id=found[0];
  }
  if(!id){id=await fbPush("players",{name:nameV,score:0,answeredCount:0,streak:0});}
  if(!id){$("l-err").textContent="Erreur connexion";return;}
  pid=id;pname=nameV;
  show("player-panel");
  $("p-name-disp").textContent=nameV;
  updateStreak(0);
  pPollIv=setInterval(pollPlayer,1200);
  pollPlayer();
}
$("l-pin").onkeydown=function(e){if(e.key==="Enter")$("l-name").focus();};
$("l-name").onkeydown=function(e){if(e.key==="Enter")playerLogin();};

async function pollPlayer(){
  var game=await fbGet("game");
  var me=await fbGet("players/"+pid);
  if(!game||!me)return;
  pGame=game;pscore=me.score||0;pstreak=me.streak||0;
  $("p-score-val").textContent=pscore;
  updateStreak(pstreak);
  renderPlayer(game);
}

function renderPlayer(game){
  var main=$("player-main");
  var ae=document.activeElement;
  if(ae&&(ae.tagName==="INPUT"||ae.tagName==="TEXTAREA")&&game.status==="question")return;
  if(game.status==="lobby"){
    main.innerHTML="<div class=\"wait\"><div class=\"wdot\"></div><h2>CONNECT&#201;</h2><p>En attente du lancement...</p></div>";return;}
  if(game.status==="countdown"){
    main.innerHTML="<div class=\"wait\"><div class=\"wdot\"></div><h2>QUESTION SUIVANTE</h2><p>Pr\u00e9parez-vous...</p></div>";return;}
  if(game.status==="question"&&game.currentQuestion>=0){
    if(pAnswered>=game.currentQuestion){
      main.innerHTML="<div class=\"wait\"><div style=\"font-size:2.5rem;\">&#10003;</div><h2>R&#201;PONSE ENVOY&#201;E</h2><p>En attente...</p></div>";return;}
    if(sliderTouched)return;
    renderPQ(QUESTIONS[game.currentQuestion],game);return;}
  if(game.status==="answer_reveal"){
    sliderTouched=false;
    main.innerHTML="<div class=\"wait\"><div style=\"font-size:2rem;\">&#128065;</div><h2>R&#201;V&#201;LATION</h2><p>Regardez le projecteur</p></div>";
    if(pTimerIv){clearInterval(pTimerIv);pTimerIv=null;}return;}
  if(game.status==="leaderboard"){
    main.innerHTML="<div class=\"wait\"><div style=\"font-size:2.5rem;\">&#127942;</div><h2>SCORE : <span style=\"color:var(--gold2);\">"+pscore+"</span></h2><p>Classement en cours...</p></div>";return;}
  if(game.status==="end"){
    main.innerHTML="<div class=\"wait\"><h2>FIN DE MISSION</h2><div style=\"font-family:var(--mono);font-size:2.5rem;color:var(--gold);\">"
      +pscore+" pts</div><p style=\"color:var(--muted);\">Merci pour votre participation</p></div>";
    if(pPollIv)clearInterval(pPollIv);return;}
}

  } else if(q.type==="wordcloud"){
    main.innerHTML="<div id=\"p-q-text\">"+q.question+"</div>"+
      "<div class=\"txt-wrap\">"+
        "<input class=\"txt-input\" id=\"txt-in\" type=\"text\" placeholder=\"Un mot...\" maxlength=\"30\" autocomplete=\"off\" autocorrect=\"off\" autocapitalize=\"off\" spellcheck=\"false\">"+
        "<button class=\"txt-submit\" onclick=\"submitWC()\">ENVOYER</button>"+
      "</div>";
    setTimeout(function(){var i=$("txt-in");if(i)i.onkeydown=function(e){if(e.key==="Enter")submitWC();};},50);
  }
}

function calcScore(correct,rem,tl){return correct?100+Math.round(900*(rem/tl)):0;}
function getRem(game,q){return game.questionStartTime?Math.max(0,q.timeLimit-(Date.now()-game.questionStartTime)/1000):q.timeLimit;}

async function processAnswer(correct,value,q){
  pAnswered=pGame.currentQuestion;
  var rem=getRem(pGame,q);
  var pts=calcScore(correct,rem,q.timeLimit);
  var newStreak=correct?(pstreak+1):0;
  var bonus=newStreak>=2?(newStreak-1)*50:0;
  var total=pts+bonus;
  pscore+=total;pstreak=newStreak;
  $("p-score-val").textContent=pscore;
  updateStreak(newStreak);
  if(correct){sndOk();vib([50,30,80]);}else{sndKo();vib([150]);}
  showFB(correct,total);
  await fbPatch("players/"+pid,{
    score:pscore,answeredCount:pGame.currentQuestion+1,streak:newStreak,
    lastAnswer:{value:value,correct:correct,pointsEarned:total,streakBonus:bonus,question:pGame.currentQuestion}
  });
  if(q.type==="mcq"&&typeof value==="number"){
    var stats=(pGame.answerStats||[0,0,0,0]).slice();
    stats[value]=(stats[value]||0)+1;
    await fbPatch("game",{answerStats:stats});
  }
}

async function submitMCQ(i){
  if(!pGame||pAnswered>=pGame.currentQuestion)return;
  var q=QUESTIONS[pGame.currentQuestion];
  var correct=(i===q.correct);
  document.querySelectorAll(".pabtn").forEach(function(b,j){
    b.classList.add("dis");
    if(j===i)b.classList.add(correct?"rc":"rw");
  });
  await processAnswer(correct,i,q);
}
async function submitTF(v){
  if(!pGame||pAnswered>=pGame.currentQuestion)return;
  var q=QUESTIONS[pGame.currentQuestion];
  var correct=(v===q.correct);
  document.querySelectorAll(".pabtn").forEach(function(b,j){
    b.classList.add("dis");
    if(j===(v?0:1))b.classList.add(correct?"rc":"rw");
  });
  await processAnswer(correct,v,q);
}
async function submitSlider(){
  if(!pGame||pAnswered>=pGame.currentQuestion)return;
  var q=QUESTIONS[pGame.currentQuestion];
  var v=parseInt($("sl-input").value,10);
  var correct=(v===q.answer);
  $("sl-input").disabled=true;
  document.querySelector(".sl-submit").disabled=true;
  var disp=$("sl-val");
  if(disp&&!correct)disp.innerHTML=v+" <span style=\"font-size:.8rem;color:var(--red);\">&#10007; "+q.answer+"</span>";
  if(disp&&correct)disp.innerHTML=v+" <span style=\"font-size:.8rem;color:var(--green);\">&#10003;</span>";
  await processAnswer(correct,v,q);
}
async function submitText(){
  if(!pGame||pAnswered>=pGame.currentQuestion)return;
  var q=QUESTIONS[pGame.currentQuestion];
  var v=$("txt-in").value.trim().toLowerCase();if(!v)return;
  $("txt-in").disabled=true;document.querySelector(".txt-submit").disabled=true;
  var correct=v===(q.answer||"").toLowerCase();
  await processAnswer(correct,v,q);
}
async function submitWC(){
  if(!pGame||pAnswered>=pGame.currentQuestion)return;
  var v=$("txt-in").value.trim().toLowerCase();if(!v)return;
  $("txt-in").disabled=true;document.querySelector(".txt-submit").disabled=true;
  pAnswered=pGame.currentQuestion;
  await fbPatch("players/"+pid,{
    answeredCount:pGame.currentQuestion+1,
    lastAnswer:{value:v,correct:true,pointsEarned:0,streakBonus:0,question:pGame.currentQuestion}
  });
  showFB(true,0,true);
}

function showFB(correct,pts,isWC){
  $("fb-emoji").textContent=isWC?"\ud83d\udcdd":(correct?"\ud83c\udfaf":"\u274c");
  $("fb-text").textContent=isWC?"MOT ENVOYE":(correct?"BONNE REPONSE !":"MAUVAISE REPONSE");
  $("fb-pts").textContent=pts>0?"+"+pts+" pts":"";
  var el=$("p-feedback");el.classList.add("show");
  setTimeout(function(){el.classList.remove("show");},1800);
}

function updateStreak(s){
  var d=$("streak-disp"),f=$("streak-fire"),c=$("streak-cnt");
  c.textContent=s;
  d.className=s>=1?"on":"";
  if(s>=3)d.classList.add("s3");
  f.textContent=s>=5?"\ud83d\udd25\ud83d\udd25\ud83d\udd25":s>=3?"\ud83d\udd25\ud83d\udd25":"\ud83d\udd25";
  if(s>0&&s%3===0){d.classList.add("sgold");setTimeout(function(){d.classList.remove("sgold");},800);}
}

function route(){
  var hash=location.hash,pin=new URLSearchParams(location.search).get("pin");
  if(hash==="#admin"){show("admin-login");}
  else if(pin){show("login-panel");$("l-pin").value=pin;}
  else{show("login-panel");}
}
document.addEventListener("DOMContentLoaded",function(){route();});
document.addEventListener("visibilitychange",function(){if(document.visibilityState==="visible"&&pPollIv)pollPlayer();});
</script>
</body>
