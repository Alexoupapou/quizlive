<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FBI — Test de Positionnement</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

:root {
  --navy: #0A0E1A;
  --navy2: #0D1220;
  --gold: #C8A951;
  --gold2: #E8C96A;
  --red: #CC2222;
  --green: #22963F;
  --text: #E8EDF5;
  --muted: #8892A4;
  --border: rgba(200,169,81,0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--navy);
  color: var(--text);
  font-family: 'Oswald', sans-serif;
  height: 100%;
  overflow: hidden;
  touch-action: manipulation;
}

/* ── ADMIN PANEL ─────────────────────────────────────── */
#admin-panel {
  display: none;
  height: 100vh;
  padding: 12px;
  overflow-y: auto;
  flex-direction: column;
  gap: 10px;
}
#admin-panel.active { display: flex; }

.admin-header {
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border); padding-bottom: 8px;
}
.admin-header img { width: 36px; height: 36px; }
.admin-header h1 { font-size: 1rem; color: var(--gold); letter-spacing: 2px; }

.admin-stats {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.stat-box {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 14px; flex: 1; min-width: 80px;
  text-align: center;
}
.stat-box .val { font-size: 1.6rem; color: var(--gold); font-family: 'Share Tech Mono'; }
.stat-box .lbl { font-size: 0.6rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

.admin-controls { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  font-family: 'Oswald'; font-size: 0.85rem; letter-spacing: 1.5px;
  padding: 10px 18px; border: none; border-radius: 4px;
  cursor: pointer; text-transform: uppercase; transition: all 0.15s;
  flex: 1;
}
.btn-gold { background: var(--gold); color: #000; }
.btn-gold:hover { background: var(--gold2); }
.btn-red { background: var(--red); color: #fff; }
.btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
.btn-outline:hover { background: rgba(200,169,81,0.1); }

.question-info {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px;
}
.question-info h3 { color: var(--gold); font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 6px; }
.question-info p { font-size: 0.85rem; line-height: 1.4; }

.answer-stats { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.ans-bar {
  flex: 1; background: var(--navy); border: 1px solid var(--border);
  border-radius: 4px; padding: 6px; text-align: center; min-width: 50px;
}
.ans-bar .ans-letter { font-size: 0.75rem; color: var(--gold); }
.ans-bar .ans-count { font-size: 1rem; font-family: 'Share Tech Mono'; }

.leaderboard-admin { margin-top: 6px; }
.leaderboard-admin .player-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 0.8rem;
}
.player-row .rank { color: var(--gold); font-family: 'Share Tech Mono'; width: 20px; }
.player-row .name { flex: 1; }
.player-row .score { font-family: 'Share Tech Mono'; color: var(--gold2); }

/* ── LIVE PROJECTEUR ─────────────────────────────────── */
#live-panel {
  display: none;
  height: 100vh;
  flex-direction: column;
  overflow: hidden;
}
#live-panel.active { display: flex; }

.live-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px;
  background: linear-gradient(135deg, #0D1220 0%, #111827 100%);
  border-bottom: 2px solid var(--gold);
  flex-shrink: 0;
}
.live-header-left { display: flex; align-items: center; gap: 10px; }
.live-header img { width: 32px; height: 32px; }
.live-header h1 { font-size: 0.8rem; color: var(--gold); letter-spacing: 3px; }
#live-question-counter {
  font-family: 'Share Tech Mono'; font-size: 0.75rem; color: var(--muted);
}
#live-timer-bar-wrap {
  height: 4px; background: rgba(255,255,255,0.05); flex-shrink: 0;
}
#live-timer-bar {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  transition: width 1s linear;
}

#live-main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 16px; gap: 12px; overflow: hidden;
}

#live-question-text {
  font-size: clamp(1rem, 3vw, 1.6rem);
  color: var(--text); text-align: center; line-height: 1.4;
  max-width: 800px;
}

.live-answers-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; width: 100%; max-width: 700px;
}
.live-answer-card {
  background: var(--navy2); border: 2px solid var(--border);
  border-radius: 8px; padding: 14px 16px;
  font-size: clamp(0.8rem, 2vw, 1rem);
  display: flex; align-items: center; gap: 10px;
  transition: all 0.3s;
}
.live-answer-card .letter {
  font-family: 'Share Tech Mono'; color: var(--gold);
  font-size: 1.1em; font-weight: bold; min-width: 20px;
}
.live-answer-card.correct { border-color: var(--green); background: rgba(34,150,63,0.15); }
.live-answer-card.wrong { border-color: var(--red); background: rgba(204,34,34,0.1); opacity: 0.5; }

/* Leaderboard live */
#live-leaderboard {
  width: 100%; max-width: 600px;
}
.lb-row {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 14px; margin-bottom: 6px;
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: 6px; transition: all 0.3s;
}
.lb-row.top1 { border-color: var(--gold); background: rgba(200,169,81,0.1); }
.lb-row .lb-rank { font-family: 'Share Tech Mono'; color: var(--gold); width: 24px; }
.lb-row .lb-name { flex: 1; font-size: 0.95rem; }
.lb-row .lb-score { font-family: 'Share Tech Mono'; color: var(--gold2); }
.lb-row .lb-streak { font-size: 0.9rem; }

/* WordCloud */
#wordcloud-container {
  width: min(600px, 90vw); height: min(350px, 50vh);
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}

/* Lobby / End */
.lobby-screen, .end-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; text-align: center; height: 100%;
}
.lobby-screen h2 { font-size: 1.8rem; color: var(--gold); letter-spacing: 4px; }
#live-qr { margin: 8px; }
#live-pin-display {
  font-family: 'Share Tech Mono'; font-size: 2.5rem; color: var(--gold);
  letter-spacing: 12px;
}
.player-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: center; max-width: 500px;
}
.player-chip {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 12px;
  font-size: 0.8rem; color: var(--text);
}

/* Countdown */
#live-countdown {
  font-family: 'Share Tech Mono'; font-size: 5rem; color: var(--gold);
  animation: countPulse 1s ease-in-out infinite;
}
@keyframes countPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* ── PLAYER PANEL ────────────────────────────────────── */
#player-panel {
  display: none;
  height: 100vh;
  flex-direction: column;
  overflow: hidden;
}
#player-panel.active { display: flex; }

.player-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: linear-gradient(135deg, #0D1220 0%, #111827 100%);
  border-bottom: 2px solid var(--gold);
  flex-shrink: 0;
}
.player-header-left { display: flex; align-items: center; gap: 8px; }
.player-header img { width: 28px; height: 28px; }
.player-title { font-size: 0.75rem; color: var(--gold); letter-spacing: 2px; }
.player-name-display { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }

/* STREAK DISPLAY — Proposition B */
#streak-display {
  display: flex; align-items: center; gap: 4px;
  background: rgba(200,169,81,0.08); border: 1px solid rgba(200,169,81,0.2);
  border-radius: 20px; padding: 4px 10px;
  transition: all 0.3s;
}
#streak-display.active {
  background: rgba(200,169,81,0.2); border-color: var(--gold);
}
#streak-fire { font-size: 1.2rem; transition: all 0.3s; }
#streak-count { font-family: 'Share Tech Mono'; font-size: 0.9rem; color: var(--gold); }
#streak-display.streak-3 #streak-fire { font-size: 1.5rem; animation: fireWobble 0.5s ease-in-out infinite; }
@keyframes fireWobble {
  0%,100% { transform: rotate(-5deg); }
  50% { transform: rotate(5deg); }
}
#streak-display.streak-gold {
  animation: goldPulse 0.8s ease-in-out;
}
@keyframes goldPulse {
  0% { transform: scale(1); }
  30% { transform: scale(1.25); box-shadow: 0 0 20px var(--gold); }
  100% { transform: scale(1); }
}

#player-score-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  background: var(--navy2); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-family: 'Share Tech Mono'; font-size: 0.75rem; color: var(--muted);
}
#player-score-val { color: var(--gold2); font-size: 0.95rem; }

#player-main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 12px 10px; gap: 12px; overflow: hidden;
}

/* Waiting states */
.waiting-state {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px; text-align: center;
}
.waiting-state .pulse-dot {
  width: 50px; height: 50px; border-radius: 50%;
  background: var(--gold); opacity: 0.3;
  animation: pulseDot 1.5s ease-in-out infinite;
}
@keyframes pulseDot {
  0%,100% { transform: scale(1); opacity: 0.3; }
  50% { transform: scale(1.2); opacity: 0.6; }
}
.waiting-state h2 { font-size: 1.1rem; color: var(--gold); letter-spacing: 2px; }
.waiting-state p { font-size: 0.8rem; color: var(--muted); }

/* Question area player */
#player-question-text {
  font-size: clamp(0.95rem, 4vw, 1.2rem);
  color: var(--text); text-align: center; line-height: 1.5;
  max-width: 340px;
}

/* Answer buttons player */
#player-answers { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 10px; }
#player-answers.grid-2 { display: grid; grid-template-columns: 1fr 1fr; }

.player-answer-btn {
  background: var(--navy2); border: 2px solid var(--border);
  border-radius: 10px; padding: 16px 14px;
  font-family: 'Oswald'; font-size: 1rem; letter-spacing: 1px;
  color: var(--text); cursor: pointer; text-align: left;
  display: flex; align-items: center; gap: 10px;
  transition: all 0.15s; min-height: 56px;
  -webkit-user-select: none; user-select: none;
}
.player-answer-btn .btn-letter {
  font-family: 'Share Tech Mono'; color: var(--gold);
  font-size: 1.1em; min-width: 22px;
}
.player-answer-btn:active { transform: scale(0.96); }
.player-answer-btn.selected { border-color: var(--gold); background: rgba(200,169,81,0.15); }
.player-answer-btn.disabled { pointer-events: none; opacity: 0.5; }

/* Proposition A — Answer reveal animation */
.player-answer-btn.reveal-correct {
  border-color: var(--green) !important; background: rgba(34,150,63,0.25) !important;
  animation: correctReveal 0.5s ease-out;
}
.player-answer-btn.reveal-wrong {
  border-color: var(--red) !important; background: rgba(204,34,34,0.2) !important;
  animation: wrongReveal 0.5s ease-out;
}
@keyframes correctReveal {
  0% { transform: scale(1); }
  40% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
@keyframes wrongReveal {
  0% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  100% { transform: translateX(0); }
}

/* Feedback overlay */
#answer-feedback {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  background: rgba(10,14,26,0.85);
  z-index: 100; pointer-events: none;
}
#answer-feedback.show { display: flex; animation: feedbackIn 0.3s ease-out; }
@keyframes feedbackIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
#feedback-emoji { font-size: 4rem; }
#feedback-text { font-size: 1.3rem; color: var(--text); letter-spacing: 2px; }
#feedback-points { font-family: 'Share Tech Mono'; font-size: 1.8rem; color: var(--gold); }

/* TF buttons */
.tf-btn {
  font-size: 1.1rem; padding: 20px; text-align: center;
  justify-content: center; min-height: 70px;
}

/* Slider */
#slider-container { width: 100%; max-width: 360px; }
#slider-display {
  font-family: 'Share Tech Mono'; font-size: 2.5rem;
  color: var(--gold); text-align: center; margin-bottom: 12px;
}
input[type=range] {
  -webkit-appearance: none; width: 100%; height: 8px;
  background: var(--navy2); border-radius: 4px;
  border: 1px solid var(--border); outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 26px; height: 26px;
  border-radius: 50%; background: var(--gold); cursor: pointer;
  border: 2px solid var(--gold2);
}
.slider-bounds {
  display: flex; justify-content: space-between;
  font-family: 'Share Tech Mono'; font-size: 0.7rem; color: var(--muted);
  margin-top: 4px;
}
#slider-submit {
  margin-top: 14px; width: 100%; padding: 16px;
  font-size: 1rem; font-family: 'Oswald'; letter-spacing: 2px;
  background: var(--gold); color: #000; border: none; border-radius: 8px;
  cursor: pointer; text-transform: uppercase;
}

/* Text answer */
#text-input-wrap { width: 100%; max-width: 360px; }
#text-answer-input {
  width: 100%; background: var(--navy2); border: 2px solid var(--border);
  border-radius: 8px; padding: 14px 16px;
  font-family: 'Share Tech Mono'; font-size: 1.1rem; color: var(--text);
  outline: none; text-align: center;
}
#text-answer-input:focus { border-color: var(--gold); }
#text-submit {
  margin-top: 10px; width: 100%; padding: 16px;
  font-size: 1rem; font-family: 'Oswald'; letter-spacing: 2px;
  background: var(--gold); color: #000; border: none; border-radius: 8px;
  cursor: pointer; text-transform: uppercase;
}

/* Wordcloud player */
#player-wordcloud-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%;
}

/* Timer player */
#player-timer {
  font-family: 'Share Tech Mono'; font-size: 2rem; color: var(--gold);
  padding: 6px 18px; border: 1px solid var(--border); border-radius: 6px;
  min-width: 60px; text-align: center;
}
#player-timer.urgent { color: var(--red); border-color: var(--red); animation: timerUrgent 0.5s ease-in-out infinite; }
@keyframes timerUrgent { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

/* Login */
#login-panel {
  display: none; height: 100vh;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; padding: 24px;
}
#login-panel.active { display: flex; }
#login-panel img { width: 70px; height: 70px; }
#login-panel h1 { font-size: 1rem; color: var(--gold); letter-spacing: 3px; text-align: center; }
#login-panel input {
  width: 100%; max-width: 320px; background: var(--navy2);
  border: 2px solid var(--border); border-radius: 8px;
  padding: 16px; font-family: 'Share Tech Mono'; font-size: 1.1rem;
  color: var(--text); outline: none; text-align: center; letter-spacing: 3px;
}
#login-panel input:focus { border-color: var(--gold); }
#login-btn {
  width: 100%; max-width: 320px; padding: 16px;
  font-family: 'Oswald'; font-size: 1rem; letter-spacing: 3px;
  background: var(--gold); color: #000; border: none; border-radius: 8px;
  cursor: pointer; text-transform: uppercase;
}
#login-error { color: var(--red); font-size: 0.85rem; min-height: 20px; text-align: center; }

/* Admin login */
#admin-login-panel {
  display: none; height: 100vh;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; padding: 24px;
}
#admin-login-panel.active { display: flex; }
#admin-pin-input {
  background: var(--navy2); border: 2px solid var(--border); border-radius: 8px;
  padding: 16px 24px; font-family: 'Share Tech Mono'; font-size: 1.5rem;
  color: var(--gold); text-align: center; letter-spacing: 8px;
  outline: none; width: 200px;
}
#admin-pin-input:focus { border-color: var(--gold); }

/* Countdown player */
#player-countdown {
  font-family: 'Share Tech Mono'; font-size: 4rem; color: var(--gold);
  animation: countPulse 1s ease-in-out infinite;
}

/* Screen overlay transitions */
.screen-fade { transition: opacity 0.3s ease; }

/* Responsive improvements */
@media (max-width: 480px) {
  .live-answers-grid { grid-template-columns: 1fr; }
  .admin-stats .stat-box .val { font-size: 1.2rem; }
}
</style>
</head>
<body>

<!-- ═══════════ ADMIN LOGIN ═══════════ -->
<div id="admin-login-panel">
  <img id="admin-logo" src="" alt="FBI">
  <h1 style="color:var(--gold);letter-spacing:3px;font-size:1.1rem;">ACCÈS RÉGIE</h1>
  <input id="admin-pin-input" type="password" inputmode="numeric" placeholder="PIN" maxlength="6">
  <button class="btn btn-gold" onclick="checkAdminPin()" style="width:200px;">ENTRER</button>
  <p id="admin-pin-error" style="color:var(--red);font-size:0.85rem;min-height:18px;"></p>
</div>

<!-- ═══════════ ADMIN PANEL ═══════════ -->
<div id="admin-panel">
  <div class="admin-header">
    <img id="admin-panel-logo" src="" alt="FBI">
    <div>
      <h1>RÉGIE — TEST POSITIONNEMENT</h1>
      <div style="font-family:'Share Tech Mono';font-size:0.65rem;color:var(--muted);" id="admin-room-info">Room: /q1/</div>
    </div>
    <div style="margin-left:auto;font-family:'Share Tech Mono';font-size:1.2rem;color:var(--gold);" id="admin-pin-disp"></div>
  </div>

  <div class="admin-stats">
    <div class="stat-box">
      <div class="val" id="stat-players">0</div>
      <div class="lbl">Agents</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-answered">0</div>
      <div class="lbl">Réponses</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-q">—</div>
      <div class="lbl">Question</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-status">—</div>
      <div class="lbl">Statut</div>
    </div>
  </div>

  <div class="admin-controls">
    <button class="btn btn-gold" onclick="adminAction('start_lobby')">🟢 DÉMARRER</button>
    <button class="btn btn-outline" onclick="adminAction('next_question')">⏭ SUIVANTE</button>
    <button class="btn btn-outline" onclick="adminAction('reveal_answer')">👁 RÉVÉLER</button>
    <button class="btn btn-outline" onclick="adminAction('show_leaderboard')">🏆 CLASSEMENT</button>
    <button class="btn btn-red" onclick="adminAction('end_quiz')">⏹ FIN</button>
    <button class="btn btn-outline" onclick="adminAction('reset')">🔄 RESET</button>
  </div>

  <div class="question-info" id="admin-q-info">
    <h3>QUESTION EN COURS</h3>
    <p id="admin-q-text">—</p>
    <div class="answer-stats" id="admin-ans-stats"></div>
  </div>

  <div class="leaderboard-admin" id="admin-lb">
    <h3 style="color:var(--gold);font-size:0.7rem;letter-spacing:2px;margin-bottom:6px;">CLASSEMENT</h3>
    <div id="admin-lb-list"></div>
  </div>
</div>

<!-- ═══════════ LIVE PROJECTEUR ═══════════ -->
<div id="live-panel">
  <div class="live-header">
    <div class="live-header-left">
      <img id="live-logo" src="" alt="FBI">
      <div>
        <h1>FEDERAL BUREAU OF INVESTIGATION</h1>
        <div style="font-size:0.6rem;color:var(--muted);letter-spacing:1px;">TEST DE POSITIONNEMENT</div>
      </div>
    </div>
    <span id="live-question-counter" style="font-family:'Share Tech Mono';">—</span>
  </div>
  <div id="live-timer-bar-wrap">
    <div id="live-timer-bar"></div>
  </div>

  <div id="live-main">
    <!-- Content injected by JS -->
  </div>
</div>

<!-- ═══════════ PLAYER LOGIN ═══════════ -->
<div id="login-panel">
  <img id="login-logo" src="" alt="FBI">
  <h1>FEDERAL BUREAU OF INVESTIGATION<br><span style="color:var(--muted);font-size:0.75rem;letter-spacing:2px;">IDENTIFICATION AGENT</span></h1>
  <input id="pin-input" type="tel" placeholder="CODE PIN" maxlength="6" inputmode="numeric">
  <input id="name-input" type="text" placeholder="NOM DE CODE" maxlength="20" style="letter-spacing:1px;">
  <button id="login-btn" onclick="playerLogin()">REJOINDRE</button>
  <p id="login-error"></p>
</div>

<!-- ═══════════ PLAYER PANEL ═══════════ -->
<div id="player-panel">
  <div class="player-header">
    <div class="player-header-left">
      <img id="player-logo" src="" alt="FBI">

let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, duration, type='sine', vol=0.3){
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch {}
}
function soundCorrect(){
  playTone(523, 0.12, 'sine', 0.25);
  setTimeout(()=>playTone(659, 0.18, 'sine', 0.25), 100);
  setTimeout(()=>playTone(784, 0.25, 'sine', 0.3), 200);
}
function soundWrong(){
  playTone(200, 0.3, 'sawtooth', 0.2);
  setTimeout(()=>playTone(150, 0.3, 'sawtooth', 0.2), 200);
}
function vibrateDevice(pattern){
  if(navigator.vibrate) navigator.vibrate(pattern);
}

function checkAdminPin(){
  const val = $('admin-pin-input').value.trim();
  if(val === ADMIN_PIN){
    showPanel('admin-panel');
    initAdmin();
  } else {
    $('admin-pin-error').textContent = 'PIN INCORRECT';
    setTimeout(()=>$('admin-pin-error').textContent='', 2000);
  }
}
$('admin-pin-input').addEventListener('keydown', e=>{ if(e.key==='Enter') checkAdminPin(); });

let adminPollInterval = null;
function initAdmin(){
  $('admin-pin-disp').textContent = '';
  loadAdminState();
  adminPollInterval = setInterval(loadAdminState, 2000);
}

async function loadAdminState(){
  const [game, players] = await Promise.all([fbGet('game'), fbGet('players')]);
  if(!game) return;

  $('stat-status').textContent = (game.status||'—').toUpperCase().slice(0,8);
  $('stat-q').textContent = game.currentQuestion >= 0 ? `${game.currentQuestion+1}/${QUESTIONS.length}` : '—';
  if(game.pin) $('admin-pin-disp').textContent = `PIN: ${game.pin}`;

  const playerList = players ? Object.values(players) : [];
  $('stat-players').textContent = playerList.length;
  const answered = playerList.filter(p=>p.answeredCount && p.answeredCount > (game.currentQuestion||0)).length;
  $('stat-answered').textContent = answered;

  if(game.currentQuestion >= 0 && game.currentQuestion < QUESTIONS.length){
    const q = QUESTIONS[game.currentQuestion];
    $('admin-q-text').textContent = q.question;

    if(q.type==='mcq' && game.answerStats){
      const html = game.answerStats.map((cnt,i)=>
        `<div class="ans-bar"><div class="ans-letter">${'ABCD'[i]}</div><div class="ans-count">${cnt}</div></div>`
      ).join('');
      $('admin-ans-stats').innerHTML = html;
    } else {
      $('admin-ans-stats').innerHTML = '';
    }
  }

  // Leaderboard
  const sorted = playerList.sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,10);
  $('admin-lb-list').innerHTML = sorted.map((p,i)=>
    `<div class="player-row">
      <span class="rank">#${i+1}</span>
      <span class="name">${p.name||'?'}</span>
      <span class="score">${p.score||0} pts</span>
      ${p.streak>=2?`<span>🔥${p.streak}</span>`:''}
    </div>`
  ).join('');
}

async function adminAction(action){
  const game = await fbGet('game') || {};
  const now = Date.now();

  if(action==='start_lobby'){
    const pin = Math.floor(100000 + Math.random()*900000);
    await fbSet('game', {
      status:'lobby', currentQuestion:-1,
      pin, quizName:QUIZ_NAME,
      questions: QUESTIONS,
      questionStartTime:0, countdownEnd:0, answerStats:[0,0,0,0]
    });
    await fbSet('players', null);
  }
  else if(action==='next_question'){
    const nextQ = (game.currentQuestion ?? -1) + 1;
    if(nextQ >= QUESTIONS.length){ await fbUpdate('game',{status:'end'}); return; }
    await fbUpdate('game',{
      status:'countdown', currentQuestion:nextQ,
      countdownEnd: now+4000, questionStartTime:0,
      answerStats:[0,0,0,0]
    });
    setTimeout(async()=>{
      await fbUpdate('game',{
        status:'question',
        questionStartTime: Date.now()
      });
    }, 4000);
  }
  else if(action==='reveal_answer'){
    await fbUpdate('game',{status:'answer_reveal'});
  }
  else if(action==='show_leaderboard'){
    await fbUpdate('game',{status:'leaderboard'});
  }
  else if(action==='end_quiz'){
    await fbUpdate('game',{status:'end'});
  }
  else if(action==='reset'){
    await fbSet('game',{status:'idle'});
    await fbSet('players',null);
  }
}

let liveState = null;
let liveTimerInterval = null;
let wordcloudWords = {};

function initLive(){
  setInterval(pollLive, 1500);
}

async function pollLive(){
  const [game, players] = await Promise.all([fbGet('game'), fbGet('players')]);
  if(!game) return;

  const status = game.status;
  const prevStatus = liveState?.status;
  const prevQ = liveState?.currentQuestion;
  liveState = game;

  if(status !== prevStatus || game.currentQuestion !== prevQ){
    renderLive(game, players||{});
  } else if(status==='question'){
    updateLiveTimer(game);
  } else if(status==='leaderboard' || status==='answer_reveal'){
    renderLive(game, players||{});
  }
  // Wordcloud updates
  if(status==='question' && game.currentQuestion >= 0){
    const q = QUESTIONS[game.currentQuestion];
    if(q.type==='wordcloud'){
      updateWordcloudLive(players||{}, game.currentQuestion);
    }
  }
}

function updateLiveTimer(game){
  if(!game.questionStartTime) return;
  const q = QUESTIONS[game.currentQuestion];
  if(!q) return;
  if(liveTimerInterval) clearInterval(liveTimerInterval);
  liveTimerInterval = setInterval(()=>{
    const elapsed = (Date.now() - game.questionStartTime) / 1000;
    const remaining = Math.max(0, q.timeLimit - elapsed);
    const pct = (remaining / q.timeLimit) * 100;
    $('live-timer-bar').style.width = pct + '%';
    const tn = $('live-timer-num');
    if(tn) tn.textContent = Math.ceil(remaining);
    if(remaining <= 0) clearInterval(liveTimerInterval);
  }, 200);
}

function updateWordcloudLive(players, qIdx){
  Object.values(players).forEach(p=>{
    if(p.lastAnswer && p.lastAnswer.question === qIdx && p.lastAnswer.value){
      const w = p.lastAnswer.value.toLowerCase().trim();
      if(w) wordcloudWords[w] = (wordcloudWords[w]||0) + 1;
    }
  });
  const canvas = $('live-wc');
  if(!canvas) return;
  const list = Object.entries(wordcloudWords).map(([w,c])=>[w, c*20+14]);
  try {
    WordCloud(canvas, {list, backgroundColor:'#0D1220', color:()=>{
      const cols = ['#C8A951','#E8C96A','#E8EDF5','#8892A4'];
      return cols[Math.floor(Math.random()*cols.length)];
    }, fontFamily:'Oswald', rotateRatio:0.3, minSize:10});
  } catch {}
}

async function playerLogin(){
  const pinVal = $('pin-input').value.trim();
  const nameVal = $('name-input').value.trim();
  if(!pinVal || pinVal.length < 6){ $('login-error').textContent = 'PIN requis (6 chiffres)'; return; }
  if(!nameVal){ $('login-error').textContent = 'Nom de code requis'; return; }

  const game = await fbGet('game');
  if(!game){ $('login-error').textContent = 'Connexion Firebase échouée'; return; }
  if(String(game.pin) !== String(pinVal)){ $('login-error').textContent = 'PIN INCORRECT'; return; }
  if(game.status !== 'lobby' && game.status !== 'question' && game.status !== 'countdown'){
    $('login-error').textContent = 'Quiz non disponible'; return;
  }

  playerName = nameVal;
  const id = await fbPush('players', { name:nameVal, score:0, answeredCount:0, streak:0 });
  if(!id){ $('login-error').textContent = 'Erreur inscription'; return; }
  playerId = id;
  showPanel('player-panel');
  $('player-name-disp').textContent = nameVal;
  updateStreakDisplay(0);
  startPlayerPoll();
}
$('pin-input').addEventListener('keydown', e=>{ if(e.key==='Enter') $('name-input').focus(); });
$('name-input').addEventListener('keydown', e=>{ if(e.key==='Enter') playerLogin(); });

function startPlayerPoll(){
  playerPollInterval = setInterval(pollPlayer, 1200);

async function pollPlayer(){
  const game = await fbGet('game');
  if(!game) return;
  currentGameState = game;

  // Fetch my player data
  const me = await fbGet(`players/${playerId}`);
  if(me){
    playerScore = me.score||0;
    playerStreak = me.streak||0;
    $('player-score-val').textContent = playerScore;
    updateStreakDisplay(playerStreak);
  }

  renderPlayer(game);
}

function startPlayerTimer(game, q){
  if(playerTimerInterval){ clearInterval(playerTimerInterval); }
  playerTimerInterval = setInterval(()=>{
    if(!game.questionStartTime) return;
    const elapsed = (Date.now() - game.questionStartTime) / 1000;
    const remaining = Math.max(0, q.timeLimit - elapsed);
    const el = $('player-timer');
    if(el){
      el.textContent = `⏱ ${Math.ceil(remaining)}`;
      el.className = remaining <= 5 ? 'urgent' : '';
      if(remaining <= 0){ clearInterval(playerTimerInterval); }
    }
  }, 200);
}

// ── Scoring ──────────────────────────────────────
// Base: 100 pts garantis si correct
// Bonus: jusqu'à 900 pts selon rapidité (ratio temps restant)
// Total max: 1000 pts + streakBonus
function calcScore(correct, timeRemaining, timeLimit){
  if(!correct) return 0;
  const base = 100;
  const speedBonus = Math.round(900 * (timeRemaining / timeLimit));
  return base + speedBonus;
}

function getTimeRemaining(game, q){
  if(!game.questionStartTime) return q.timeLimit;
  const elapsed = (Date.now() - game.questionStartTime) / 1000;
  return Math.max(0, q.timeLimit - elapsed);
}

// ── Submit functions ──────────────────────────────
async function submitMCQ(choiceIdx){
  if(!currentGameState || lastQuestionAnswered >= currentGameState.currentQuestion) return;
  const q = QUESTIONS[currentGameState.currentQuestion];
  const correct = (choiceIdx === q.correct);
  const timeRemaining = getTimeRemaining(currentGameState, q);
  await processAnswer(correct, timeRemaining, q.timeLimit, choiceIdx, q);

  // Visual feedback — Proposition A
  const btns = document.querySelectorAll('.player-answer-btn');
  btns.forEach((b,i)=>{ b.classList.add('disabled'); if(i===choiceIdx) b.classList.add(correct?'reveal-correct':'reveal-wrong'); });
  showFeedback(correct, calcScore(correct, timeRemaining, q.timeLimit));

  // Stats
  const stats = currentGameState.answerStats || [0,0,0,0];
  stats[choiceIdx] = (stats[choiceIdx]||0) + 1;
  await fbUpdate('game',{answerStats: stats});
}

async function submitTF(answer){
  if(!currentGameState || lastQuestionAnswered >= currentGameState.currentQuestion) return;
  const q = QUESTIONS[currentGameState.currentQuestion];
  const correct = (answer === q.correct);
  const timeRemaining = getTimeRemaining(currentGameState, q);
  await processAnswer(correct, timeRemaining, q.timeLimit, answer, q);

  const btns = document.querySelectorAll('.player-answer-btn');
  btns.forEach((b,i)=>{
    b.classList.add('disabled');
    const btnVal = i===0;
    if(btnVal === answer) b.classList.add(correct?'reveal-correct':'reveal-wrong');
  });
  showFeedback(correct, calcScore(correct, timeRemaining, q.timeLimit));
}

async function submitSlider(){
  if(!currentGameState || lastQuestionAnswered >= currentGameState.currentQuestion) return;
  const q = QUESTIONS[currentGameState.currentQuestion];
  const sliderVal = parseInt($('slider-input').value, 10);

  // ── BUG FIX: vérification ±10% ──
  const tolerance = q.answer * 0.1;
  const correct = Math.abs(sliderVal - q.answer) <= tolerance;

  const timeRemaining = getTimeRemaining(currentGameState, q);
  $('slider-submit').disabled = true;
  await processAnswer(correct, timeRemaining, q.timeLimit, sliderVal, q);
  showFeedback(correct, calcScore(correct, timeRemaining, q.timeLimit));

  // Show correct answer
  const disp = $('slider-display');
  if(disp) disp.innerHTML = `${sliderVal} <span style="font-size:0.8rem;color:${correct?'var(--green)':'var(--red)'};">${correct?'✓':'✗ Réponse: '+q.answer}</span>`;
}

async function submitText(){
  if(!currentGameState || lastQuestionAnswered >= currentGameState.currentQuestion) return;
  const q = QUESTIONS[currentGameState.currentQuestion];
  const inputEl = $('text-answer-input');
  const val = inputEl.value.trim().toLowerCase();
  if(!val) return;
  const correct = (val === (q.answer||'').toLowerCase());
  const timeRemaining = getTimeRemaining(currentGameState, q);
  $('text-submit').disabled = true; inputEl.disabled = true;
  await processAnswer(correct, timeRemaining, q.timeLimit, val, q);
  showFeedback(correct, calcScore(correct, timeRemaining, q.timeLimit));
}

async function submitWordcloud(){
  if(!currentGameState || lastQuestionAnswered >= currentGameState.currentQuestion) return;
  const q = QUESTIONS[currentGameState.currentQuestion];
  const inputEl = $('text-answer-input');
  const val = inputEl.value.trim().toLowerCase();
  if(!val) return;
  $('text-submit').disabled = true; inputEl.disabled = true;
  lastQuestionAnswered = currentGameState.currentQuestion;
  await fbUpdate(`players/${playerId}`,{
    answeredCount: currentGameState.currentQuestion + 1,
    'lastAnswer': { value:val, correct:true, pointsEarned:0, streakBonus:0, question:currentGameState.currentQuestion }
  });
  showFeedback(true, 0, true);
}

async function processAnswer(correct, timeRemaining, timeLimit, value, q){
  lastQuestionAnswered = currentGameState.currentQuestion;
  const pts = calcScore(correct, timeRemaining, timeLimit);

  let newStreak = correct ? (playerStreak + 1) : 0;
  const streakBonus = newStreak >= 2 ? (newStreak - 1) * 50 : 0;
  const totalPts = pts + streakBonus;

  const newScore = playerScore + totalPts;
  playerStreak = newStreak;
  playerScore = newScore;

  $('player-score-val').textContent = newScore;
  updateStreakDisplay(newStreak);

  // Vibration — Proposition A
  if(correct){
    vibrateDevice([50, 30, 80]);
    soundCorrect();
  } else {
    vibrateDevice([150]);
    soundWrong();
  }

  await fbUpdate(`players/${playerId}`,{
    score: newScore,
    answeredCount: currentGameState.currentQuestion + 1,
    streak: newStreak,
    lastAnswer: { value, correct, pointsEarned:totalPts, streakBonus, question:currentGameState.currentQuestion }
  });
}

// ── Feedback overlay — Proposition A ────────────
function showFeedback(correct, pts, isWordcloud=false){
  const overlay = $('answer-feedback');
  $('feedback-emoji').textContent = isWordcloud ? '📝' : (correct ? '🎯' : '❌');
  $('feedback-text').textContent = isWordcloud ? 'MOT ENVOYÉ' : (correct ? 'BONNE RÉPONSE !' : 'MAUVAISE RÉPONSE');
  $('feedback-points').textContent = pts > 0 ? `+${pts} pts` : '';
  overlay.classList.add('show');
  setTimeout(()=>overlay.classList.remove('show'), 1800);
}

// ── Streak display — Proposition B ──────────────
function updateStreakDisplay(streak){
  const disp = $('streak-display');
  const fire = $('streak-fire');
  const cnt = $('streak-count');
  cnt.textContent = streak;

  disp.className = 'streak-display';
  if(streak >= 1) disp.classList.add('active');
  if(streak >= 3) disp.classList.add('streak-3');

  // Pulse animation on new streak milestone
  if(streak > 0 && streak % 3 === 0){
    disp.classList.add('streak-gold');
    setTimeout(()=>disp.classList.remove('streak-gold'), 800);
  }

  // Grow fire
  if(streak === 0) fire.textContent = '🔥';
  else if(streak < 3) fire.textContent = '🔥';
  else if(streak < 5) fire.textContent = '🔥🔥';
  else fire.textContent = '🔥🔥🔥';
}

// ══════════════════════════════════════════════════
//  ROUTING
// ══════════════════════════════════════════════════
function route(){
  const hash = location.hash;
  const params = new URLSearchParams(location.search);
  const pin = params.get('pin');

  if(hash === '#admin'){
    showPanel('admin-login-panel');
  } else if(hash === '#live'){
    showPanel('live-panel');
    initLive();
  } else if(pin){
    showPanel('login-panel');
    $('pin-input').value = pin;
  } else {
    showPanel('login-panel');
  }
}

// ══════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', ()=>{
  setLogo();
  route();
});
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible'){
    if(playerPollInterval) pollPlayer();
    if(adminPollInterval) loadAdminState();
  }
});
</script>
</body>
</html>
